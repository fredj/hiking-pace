<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Visualise your hiking pace vs slope from GPX tracks">
    <title>hiking-pace</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="graph.css">
  </head>
  <body>
    <header>
      <h1>hiking-pace</h1>
      <p>Drop GPX files onto the chart to plot your pace vs slope</p>
    </header>

    <main>
      <div id="chart-container">
        <svg id="graph" width="960" height="500"></svg>
        <div id="drop-hint">Drop .gpx files here</div>
      </div>

      <div id="controls">
        <button id="export" type="button">Save as PNG</button>
      </div>

      <div id="files"></div>
    </main>

    <script src="index.js"></script>
  </body>
</html>
